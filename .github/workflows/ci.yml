name: CI Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  backend-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make Maven wrapper executable
        run: chmod +x mbemlevel/mvnw

      - name: Run Backend Tests
        run: |
          cd mbemlevel
          ./mvnw clean test

  frontend-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'mbemnova-web - Copie/package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          cd "mbemnova-web - Copie"
          npm ci

      - name: Build Frontend Application
        run: |
          cd "mbemnova-web - Copie"
          npm run build

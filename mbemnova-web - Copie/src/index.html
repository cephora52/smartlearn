<!doctype html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="utf-8">
  <title>MbemNova</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="MbemNova — Formation tech certifiante en Afrique Centrale. Payez en tranches, apprenez à votre rythme.">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="MbemNova">

  <!-- Sécurité -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Fonts préchargement critique -->
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap"
    media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap">
  </noscript>
</head>
<body class="bg-white text-slate-900 antialiased">
  <app-root>
    <!-- Skeleton de chargement initial (visible < 1s, évite l'écran blanc) -->
    <div style="min-height:100vh;background:#fff;font-family:'DM Sans',system-ui,sans-serif;">
      <nav style="height:64px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;background:#fff;z-index:50;">
        <div style="width:140px;height:36px;background:#e2e8f0;border-radius:8px;animation:pulse 2s infinite;"></div>
        <div style="flex:1;"></div>
        <div style="width:80px;height:36px;background:#e2e8f0;border-radius:8px;"></div>
        <div style="width:36px;height:36px;background:#e2e8f0;border-radius:50%;"></div>
      </nav>
      <main style="max-width:1200px;margin:0 auto;padding:32px 24px;">
        <div style="height:280px;background:linear-gradient(135deg,#eff6ff,#dbeafe);border-radius:16px;margin-bottom:32px;"></div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;">
          <div style="height:220px;background:#f1f5f9;border-radius:12px;"></div>
          <div style="height:220px;background:#f1f5f9;border-radius:12px;"></div>
          <div style="height:220px;background:#f1f5f9;border-radius:12px;"></div>
        </div>
      </main>
    </div>
  </app-root>
</body>
</html>
